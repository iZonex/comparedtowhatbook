<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 486" width="780" height="486" font-family="'Iowan Old Style', Charter, Georgia, serif">
<defs>
<pattern id="hatch-ink" patternUnits="userSpaceOnUse" width="5" height="5" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="5" stroke="#16130e" stroke-width="1.15"/></pattern>
<pattern id="hatch-spot" patternUnits="userSpaceOnUse" width="5" height="5" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="5" stroke="#8a1a12" stroke-width="1.15"/></pattern>
<pattern id="hatch-open" patternUnits="userSpaceOnUse" width="11" height="11" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="11" stroke="#3d362c" stroke-width="0.9"/></pattern>
<marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#3d362c"/></marker>
</defs>
<rect width="780" height="486" fill="#faf7ef"/>
<text x="225" y="103.0" text-anchor="end" font-size="18" fill="#3d362c">Криптопотери</text>
<text x="225" y="123.0" text-anchor="end" font-size="12.5" letter-spacing="1.6" fill="#3d362c" opacity="0.7">2025</text>
<rect x="241" y="62" width="133.7" height="78" fill="url(#hatch-ink)"/>
<rect x="241" y="62" width="133.7" height="78" fill="none" stroke="#16130e" stroke-width="1.6"/>
<text x="374.7" y="50" text-anchor="end" font-size="23" fill="#16130e" font-weight="bold">$20.40B</text>
<line x1="374.7" y1="57" x2="374.7" y2="153" stroke="#16130e" stroke-width="3"/>
<line x1="365.7" y1="57" x2="383.7" y2="57" stroke="#16130e" stroke-width="2.2"/>
<line x1="365.7" y1="153" x2="383.7" y2="153" stroke="#16130e" stroke-width="2.2"/>
<text x="248" y="174" font-size="13.5" fill="#3d362c">счёт, близкий к полному</text>
<text x="225" y="277.0" text-anchor="end" font-size="18" fill="#3d362c">Карточное мошенничество</text>
<text x="225" y="297.0" text-anchor="end" font-size="12.5" letter-spacing="1.6" fill="#3d362c" opacity="0.7">2024</text>
<rect x="241" y="236" width="218.9" height="78" fill="url(#hatch-ink)"/>
<rect x="241" y="236" width="218.9" height="78" fill="none" stroke="#16130e" stroke-width="1.6"/>
<text x="459.9" y="224" text-anchor="end" font-size="23" fill="#16130e" font-weight="bold">$33.41B</text>
<rect x="459.9" y="236" width="294.1" height="78" fill="url(#hatch-open)" opacity="0.55"/>
<line x1="459.9" y1="236" x2="754.0" y2="236" stroke="#3d362c" stroke-width="1.1" stroke-dasharray="5 5"/>
<line x1="459.9" y1="314" x2="754.0" y2="314" stroke="#3d362c" stroke-width="1.1" stroke-dasharray="5 5"/>
<line x1="477.9" y1="275.0" x2="752.0" y2="275.0" stroke="#3d362c" stroke-width="1.6" marker-end="url(#arrow)"/>
<text x="248" y="348" font-size="13.5" fill="#3d362c">один измеренный угол — остальное нигде не посчитано</text>
<line x1="241" y1="42" x2="241" y2="362" stroke="#16130e" stroke-width="1.6"/>
<line x1="241" y1="388" x2="720" y2="388" stroke="#3d362c" stroke-width="1.2" opacity="0.5"/>
<text x="248" y="412" font-size="13" fill="#3d362c">Те же итоги, что и на прошлой фигуре. Разное — сколько из каждого известно.</text>
</svg>
