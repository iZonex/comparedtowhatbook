<line x1="196" y1="388" x2="720" y2="388" stroke="#3d362c" stroke-width="1.2" opacity="0.5"/>
<text x="203" y="412" font-size="13" fill="#3d362c">Os mesmos totais da figura anterior. O que muda é quanto se sabe de cada um.</text>
