<rect x="205" y="62" width="145.1" height="78" fill="none" stroke="#16130e" stroke-width="1.6"/>
<text x="350.1" y="50" text-anchor="end" font-size="23" fill="#16130e" font-weight="bold">$20.40B</text>
<line x1="350.1" y1="57" x2="350.1" y2="153" stroke="#16130e" stroke-width="3"/>
<line x1="341.1" y1="57" x2="359.1" y2="57" stroke="#16130e" stroke-width="2.2"/>
<line x1="341.1" y1="153" x2="359.1" y2="153" stroke="#16130e" stroke-width="2.2"/>
<text x="212" y="174" font-size="13.5" fill="#3d362c">un recuento casi completo</text>
<text x="189" y="277.0" text-anchor="end" font-size="18" fill="#3d362c">Fraude con tarjetas</text>
<text x="189" y="297.0" text-anchor="end" font-size="12.5" letter-spacing="1.6" fill="#3d362c" opacity="0.7">2024</text>
<rect x="205" y="236" width="237.6" height="78" fill="url(#hatch-ink)"/>
<rect x="205" y="236" width="237.6" height="78" fill="none" stroke="#16130e" stroke-width="1.6"/>
<text x="442.6" y="224" text-anchor="end" font-size="23" fill="#16130e" font-weight="bold">$33.41B</text>
<rect x="442.6" y="236" width="311.4" height="78" fill="url(#hatch-open)" opacity="0.55"/>
<line x1="442.6" y1="236" x2="754.0" y2="236" stroke="#3d362c" stroke-width="1.1" stroke-dasharray="5 5"/>
<line x1="442.6" y1="314" x2="754.0" y2="314" stroke="#3d362c" stroke-width="1.1" stroke-dasharray="5 5"/>
<line x1="460.6" y1="275.0" x2="752.0" y2="275.0" stroke="#3d362c" stroke-width="1.6" marker-end="url(#arrow)"/>
<text x="212" y="348" font-size="13.5" fill="#3d362c">un rincón medido — el resto no se cuenta en ninguna parte</text>
<line x1="205" y1="42" x2="205" y2="362" stroke="#16130e" stroke-width="1.6"/>
<line x1="205" y1="388" x2="720" y2="388" stroke="#3d362c" stroke-width="1.2" opacity="0.5"/>
<text x="212" y="412" font-size="13" fill="#3d362c">Los mismos totales que en la figura anterior. Cambia cuánto se conoce de cada uno.</text>
</svg>
