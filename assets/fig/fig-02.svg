<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 486" width="780" height="486" font-family="'Iowan Old Style', Charter, Georgia, serif">
<defs>
<pattern id="hatch-ink" patternUnits="userSpaceOnUse" width="5" height="5" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="5" stroke="#16130e" stroke-width="1.15"/></pattern>
<pattern id="hatch-spot" patternUnits="userSpaceOnUse" width="5" height="5" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="5" stroke="#8a1a12" stroke-width="1.15"/></pattern>
<pattern id="hatch-open" patternUnits="userSpaceOnUse" width="11" height="11" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="11" stroke="#3d362c" stroke-width="0.9"/></pattern>
<marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#3d362c"/></marker>
</defs>
<rect width="780" height="486" fill="#faf7ef"/>
<text x="135" y="103.0" text-anchor="end" font-size="18" fill="#3d362c">Crypto losses</text>
<text x="135" y="123.0" text-anchor="end" font-size="12.5" letter-spacing="1.6" fill="#3d362c" opacity="0.7">2025</text>
<rect x="151" y="62" width="162.2" height="78" fill="url(#hatch-ink)"/>
<rect x="151" y="62" width="162.2" height="78" fill="none" stroke="#16130e" stroke-width="1.6"/>
<text x="313.2" y="50" text-anchor="end" font-size="23" fill="#16130e" font-weight="bold">$20.40B</text>
<line x1="313.2" y1="57" x2="313.2" y2="153" stroke="#16130e" stroke-width="3"/>
<line x1="304.2" y1="57" x2="322.2" y2="57" stroke="#16130e" stroke-width="2.2"/>
<line x1="304.2" y1="153" x2="322.2" y2="153" stroke="#16130e" stroke-width="2.2"/>
<text x="158" y="174" font-size="13.5" fill="#3d362c">a near-complete count</text>
<text x="135" y="277.0" text-anchor="end" font-size="18" fill="#3d362c">Card fraud</text>
<text x="135" y="297.0" text-anchor="end" font-size="12.5" letter-spacing="1.6" fill="#3d362c" opacity="0.7">2024</text>
<rect x="151" y="236" width="265.7" height="78" fill="url(#hatch-ink)"/>
<rect x="151" y="236" width="265.7" height="78" fill="none" stroke="#16130e" stroke-width="1.6"/>
<text x="416.7" y="224" text-anchor="end" font-size="23" fill="#16130e" font-weight="bold">$33.41B</text>
<rect x="416.7" y="236" width="337.3" height="78" fill="url(#hatch-open)" opacity="0.55"/>
<line x1="416.7" y1="236" x2="754.0" y2="236" stroke="#3d362c" stroke-width="1.1" stroke-dasharray="5 5"/>
<line x1="416.7" y1="314" x2="754.0" y2="314" stroke="#3d362c" stroke-width="1.1" stroke-dasharray="5 5"/>
<line x1="434.7" y1="275.0" x2="752.0" y2="275.0" stroke="#3d362c" stroke-width="1.6" marker-end="url(#arrow)"/>
<text x="158" y="348" font-size="13.5" fill="#3d362c">one measured corner — the rest is not counted anywhere</text>
<line x1="151" y1="42" x2="151" y2="362" stroke="#16130e" stroke-width="1.6"/>
<line x1="151" y1="388" x2="720" y2="388" stroke="#3d362c" stroke-width="1.2" opacity="0.5"/>
<text x="158" y="412" font-size="13" fill="#3d362c">Same totals as the previous figure. What differs is how much of each is known.</text>
</svg>
